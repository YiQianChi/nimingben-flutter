name: nimingben
description: 匿名本 — 匿名随机匹配聊天 App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 网络
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # 状态管理
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # 路由
  go_router: ^13.0.0

  # 本地存储
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  flutter_spinkit: ^5.2.0
  confetti: ^0.7.0
  audioplayers: ^5.2.0

  # 工具
  uuid: ^4.2.0
  intl: ^0.19.0
  logger: ^2.0.0
  connectivity_plus: ^5.0.0
  image_picker: ^1.0.0
  path_provider: ^2.1.0
  record: ^5.2.1
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

dependency_overrides:
  record_linux: ^1.0.0
